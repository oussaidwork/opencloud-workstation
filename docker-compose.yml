services:
  openclaw:
    build:
      context: ./openclaw
    container_name: opencloud-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw-config:/home/opc/.openclaw
      - workspace:/home/opc/workspace
      - ./openclaw/config/openclaw.json:/home/opc/.openclaw/openclaw.json
      - ./openclaw/skills:/home/opc/workspace/skills
      - ./openclaw/scripts:/home/opc/workspace/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    environment:
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: opencloud-code-server
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - workspace:/home/coder/workspace
      - ./code-server/config.yaml:/config/code-server/config.yaml
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - DEFAULT_WORKSPACE=/home/coder/workspace
      - PASSWORD=${CODE_SERVER_PASSWORD}

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: opencloud-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    profiles:
      - tunnel
    env_file: .env
    depends_on:
      - openclaw
      - code-server

volumes:
  openclaw-config:
  workspace:
